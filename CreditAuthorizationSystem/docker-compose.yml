version: '3.9'

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: credituser
      RABBITMQ_DEFAULT_PASS: creditpass

  auth-api:
    build:
      context: .
      dockerfile: CreditAuthorizationSystem.Auth.Api/Dockerfile
    ports:
      - "5001:8080"

  customer-api:
    build:
      context: .
      dockerfile: CreditAuthorizationSystem.Customers.Api/Dockerfile
    ports:
      - "5002:8080"

  transactions-api:
    build:
      context: .
      dockerfile: CreditAuthorizationSystem.Transactions.Api/Dockerfile
    ports:
      - "5003:8080"